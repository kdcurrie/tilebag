services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    ports:
      - "5432:5432"            # left = your mac, right = inside container
    volumes:
      - tilebag_data:/var/lib/postgresql/data

volumes:
  tilebag_data: